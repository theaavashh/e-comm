apiVersion: v1
kind: ConfigMap
metadata:
  name: gharsamma-config
  namespace: gharsamma
data:
  NODE_ENV: "production"
  PORT: "3001"
  API_URL: "http://api:3001"
  NEXT_PUBLIC_API_URL: "http://api:3001"
---
apiVersion: v1
kind: Secret
metadata:
  name: gharsamma-secrets
  namespace: gharsamma
type: Opaque
stringData:
  DATABASE_URL: "postgresql://gharsamma:CHANGEME@postgres:5432/gharsamma"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "CHANGEME-SECRET-KEY"
  CLOUDINARY_CLOUD_NAME: "CHANGEME"
  CLOUDINARY_API_KEY: "CHANGEME"
  CLOUDINARY_API_SECRET: "CHANGEME"
